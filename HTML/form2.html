<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day3 form</title>
</head>
<body>
    
    <form action="">
        <fieldset>
            <legend><mark>Personal Information</mark></legend>
        <label for="">Name :</label>
        <input type="text" id="" name="" placeholder="Enter your name" required >
        <br>
        <br>
        <label for="">Address :</label>
        <input type="text" id="" name="" placeholder="Enter your address" required>
        <br>
        <br>
        <label for="">Zip Code :</label>
        <input type="text" id="" name="" placeholder="Enter a 5-digit zip code" required minlength="5" maxlength="5">
        <br>
        <br>
        <label for="">Country :</label>
        <select id="country" name="" required>
            <option value="">Select a country</option>
            <option value="">United States</option>
            <option value="">Canada</option>
            <option value="">United Kingdom</option>
            <option value="">Australia</option>
        </select>
        <br>
        <br>
        <label for="gender">Gender :</label>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female" required>
        <label for="female">Female</label>
        <br>
        <br>
        <label for="preferences">Preferences :</label>
        <input type="checkbox" id="option1" name="preferences" value="option1">
        <label for="option1">Red</label>
        <input type="checkbox" id="option2" name="preferences" value="option2">
        <label for="option2">Green</label>
        <input type="checkbox" id="option3" name="preferences" value="option3">
        <label for="option3">Blue</label>
        <br>
        <br>
        <label for="phone">Phone Number :</label>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required minlength="10" maxlength="10">
        <br>
        <br>
        <label for="email">Email :</label>
        <input type="email" id="email" name="email" placeholder="Enter your email" required>
        <br>
        <br>
        <label for="password">Password :</label>
        <input type="password" id="password" name="password" placeholder="6-8 characters" required minlength="6" maxlength="8">
        <br>
        <br>
        <label for="verify">Verify Password :</label>
        <input type="password" id="verify" name="verify" placeholder="Verify your password" required minlength="6" maxlength="8">
        <br>
        <br>
        <label for="birthday">Birthday :</label>
        <input type="date" id="birthday" name="birthday" required>
        <br>
        <br>
        <label for="appointment">Appointment :</label>
        <input type="time" id="appointment" name="appointment" required>
        <br>
        <br>
        <input type="submit" value="SEND">
        <input type="reset" value="CLEAR">
        </fieldset>
    </form>
</body>
</html>
