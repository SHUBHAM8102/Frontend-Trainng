<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music App</title>

<style>
/* LESS-like minimal CSS */

body {
  margin: 0;
  font-family: Arial;
}

/* Header */
header {
  background: #1f2a44;
  color: #fff;
  text-align: center;
  padding: 12px;
}

/* Container */
.container {
  width: 60%;
  margin: 20px auto;
}

/* Row */
.music-row {
  display: flex;
  align-items: center;
  margin: 15px 0;
  padding: 10px;
  background: #0d1b2a;
}

/* Circle */
.circle {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 2px solid red;
  margin-right: 15px;
}

/* Audio */
audio {
  width: 100%;
}
</style>

</head>
<body>

<header>Music App</header>

<div class="container">

  <div class="music-row">
    <div class="circle"></div>
    <audio controls></audio>
  </div>

  <div class="music-row">
    <div class="circle"></div>
    <audio controls></audio>
  </div>

  <div class="music-row">
    <div class="circle"></div>
    <audio controls></audio>
  </div>

  <div class="music-row">
    <div class="circle"></div>
    <audio controls></audio>
  </div>

</div>

</body>
</html>
